{% extends "base.html" %}

{% block content %}
<section class="ux-authMessagePage">
  <div class="container ux-authMessageCard">
    <span class="ux-kicker">SonicCity account</span>
    <h1>Reset password</h1>
    {% if status %}<div class="ux-contactNotice ux-contactNoticeSuccess">{{ status }}</div>{% endif %}
    {% if error %}<div class="ux-contactNotice ux-contactNoticeError">{{ error }}</div>{% endif %}
    {% if not status %}
      <form class="ux-contactForm" method="post" action="/auth/reset-password">
        <input type="hidden" name="csrf_token" value="{{ _csrf_token if _csrf_token is defined else '' }}">
        <input type="hidden" name="token" value="{{ token }}">
        <label><span>New password</span><input type="password" name="password" autocomplete="new-password" minlength="8" required></label>
        <label><span>Repeat password</span><input type="password" name="repeatPassword" autocomplete="new-password" minlength="8" required></label>
        <button class="btn btn-primary ct-primaryBtn" type="submit">Save password</button>
      </form>
    {% else %}
      <button class="btn btn-primary ct-primaryBtn" type="button" data-auth-open>Log In</button>
    {% endif %}
  </div>
</section>
{% endblock %}
