{% extends "base.html" %}

{% block content %}
  <div class="MapShell">
    <div id="map" class="MapFull" aria-label="Map"></div>

    <div class="Overlay OverlayLeft">
      <div class="OverlayCard">
        <div class="Row">
          <button id="btnLocate" class="Btn BtnPrimary" type="button">{{ T["cta_start_gps"] }}</button>
          <button id="btnStop" class="Btn" type="button" disabled>{{ T["cta_stop"] }}</button>
          <label class="Toggle">
            <input id="autoMode" type="checkbox"/>
            {{ T["cta_auto"] }}
          </label>
        </div>
        <div id="status" class="Status">{{ T["status_ready"] }}</div>
      </div>

      <div class="OverlayCard">
        <h2 class="H3" style="margin:0 0 10px 0">{{ T["nearby_title"] }}</h2>
        <ul id="citiesList" class="CitiesList"></ul>
      </div>
    </div>

    <div class="Overlay OverlayRight">
      <div class="OverlayCard" id="storyPanel">
        <div class="StoryHeader">
          <h2 class="H3" id="storyTitle">{{ T["city_outline"] }}</h2>
          <div class="StoryBtns">
            <button id="btnSpeak" class="Btn BtnPrimary" type="button" disabled>{{ T["listen_all"] }}</button>
            <button id="btnStopSpeech" class="Btn" type="button" disabled>{{ T["stop"] }}</button>
            <button id="btnPause" class="Btn" type="button" disabled>{{ T["pause"] }}</button>
            <button id="btnResume" class="Btn" type="button" disabled>{{ T["resume"] }}</button>
          </div>
        </div>
        <div id="storySource" class="Hint"></div>
        <div id="storySections" class="Outline"></div>
      </div>
    </div>
  </div>

  <script>
    window.APP_LANG = {{ lang|tojson }};
    window.I18N = {{ T|tojson }};
  </script>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='app.js') }}?v={{ ASSET_VER }}"></script>
{% endblock %}
