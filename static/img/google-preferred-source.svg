      <stop offset="1" stop-color="#f7f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-40%" width="120%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0b1f44" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="210" height="44" rx="22" fill="url(#bg)" stroke="#dfe5f2" filter="url(#shadow)"/>
  <g transform="translate(18 12)">
